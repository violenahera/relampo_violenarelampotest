name: 🌩️ Distributed Relampo Test

on:
  workflow_dispatch:

jobs:
  run-nodes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [1, 2]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup latest Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install Relampo CLI
        run: |
          curl -fsSL https://dl.relampo.com/install.sh | bash

      - name: Install relampo-worker
        run: |
          mkdir -p "$HOME/.local/bin"
          if [ -f "scenarios/relampo-worker" ]; then
            chmod +x "scenarios/relampo-worker"
            install -m 0755 "scenarios/relampo-worker" "$HOME/.local/bin/relampo-worker"
            echo "Using repository relampo-worker override from scenarios/relampo-worker"
          else
            RELAMPO_VERSION="$(curl -fsSL https://dl.relampo.com/relampo/latest.txt | tr -d '[:space:]')"
            WORKER_URL="https://dl.relampo.com/relampo/v${RELAMPO_VERSION}/relampo-worker_${RELAMPO_VERSION}_linux_amd64.tar.gz"
            curl -fsSL "$WORKER_URL" -o /tmp/relampo-worker.tar.gz
            tar -xzf /tmp/relampo-worker.tar.gz -C /tmp
            install -m 0755 /tmp/relampo-worker "$HOME/.local/bin/relampo-worker"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run worker node
        env:
          RELAMPO_NODE: ${{ matrix.node }}
        run: |
          echo "🏁 Starting node $RELAMPO_NODE of 2"
          SCENARIO_PATH='scenarios/Relampo2.yaml'
          SCENARIO_DIR="$(dirname "$SCENARIO_PATH")"
          SCENARIO_FILE="$(basename "$SCENARIO_PATH")"
          VUS_FLAG=""
          if [ -n "" ]; then
            VUS_FLAG="--vus "
          fi
          set -o pipefail
          WORKER_STATUS=0
          (
            cd "$SCENARIO_DIR"
            OUTPUT_FILE="$(mktemp)"
            echo $'\033[38;5;214m⠸ Esto no es magia, relampo solo está trabajando, pronto te mostraré los resultados.\033[0m'
            RELAMPO_P95_ALERT=0
            relampo_extract_stats() {
              local file="$1"
              local start_line="$2"
              awk -v from="$start_line" '
                BEGIN {
                  count = 0
                  errs = 0
                  sum = 0
                  minv = -1
                  maxv = 0
                  p95 = 0
                  active_last = 0
                  active_max = 0
                }
                NR < from { next }
                {
                  if ($0 !~ /"method":"[A-Z]+"/) next
                  if ($0 ~ /"method":"INFO"/ || $0 ~ /"method":"SYSTEM"/) next
                  lat = 0
                  st = 0
                  if (match($0, /"latency_ms":[0-9.]+/)) {
                    lat_s = substr($0, RSTART + 13, RLENGTH - 13)
                    lat = lat_s + 0
                  }
                  if (match($0, /"status":[0-9]+/)) {
                    st_s = substr($0, RSTART + 9, RLENGTH - 9)
                    st = st_s + 0
                  }
                  count++
                  lats[count] = lat
                  sum += lat
                  if (minv < 0 || lat < minv) minv = lat
                  if (lat > maxv) maxv = lat
                  if (st >= 400) errs++
                  if (match($0, /"concurrency":[0-9]+/)) {
                    conc_s = substr($0, RSTART + 14, RLENGTH - 14)
                    conc = conc_s + 0
                    active_last = conc
                    if (conc > active_max) active_max = conc
                  }
                }
                END {
                  if (count > 0) {
                    for (i = 2; i <= count; i++) {
                      key = lats[i]
                      j = i - 1
                      while (j >= 1 && lats[j] > key) {
                        lats[j + 1] = lats[j]
                        j--
                      }
                      lats[j + 1] = key
                    }
                    pidx = int((count * 95 + 99) / 100)
                    if (pidx < 1) pidx = 1
                    if (pidx > count) pidx = count
                    p95 = lats[pidx]
                  }
                  if (minv < 0) minv = 0
                  printf("%d|%.3f|%.3f|%.3f|%d|%.3f|%d|%d\n", count, sum, minv, maxv, errs, p95, active_last, active_max)
                }
              ' "$file"
            }
            relampo_fmt_hms() {
              local s="$1"
              if [ "$s" -lt 0 ]; then
                s=0
              fi
              printf '%02d:%02d:%02d' $((s / 3600)) $(((s % 3600) / 60)) $((s % 60))
            }
            relampo_print_summary() {
              local prefix="$1"
              local count="$2"
              local elapsed="$3"
              local sum="$4"
              local minv="$5"
              local maxv="$6"
              local errs="$7"
              local p95="$8"
              local active_last="$9"
              local active_max="${10}"
              if [ "$count" -le 0 ]; then
                return
              fi
              if [ "$elapsed" -le 0 ]; then
                elapsed=1
              fi
              local rate avg errpct
              rate="$(awk -v c="$count" -v e="$elapsed" 'BEGIN { printf "%.1f", (e > 0 ? c / e : 0) }')"
              avg="$(awk -v s="$sum" -v c="$count" 'BEGIN { printf "%.1f", (c > 0 ? s / c : 0) }')"
              errpct="$(awk -v e="$errs" -v c="$count" 'BEGIN { printf "%.2f", (c > 0 ? (e * 100.0) / c : 0) }')"
              local p95_alarm=""
              if awk -v v="$p95" 'BEGIN { exit !(v > 8000.0) }'; then
                p95_alarm=" ⚠"
                RELAMPO_P95_ALERT=1
              fi
              printf 'summary %s %7d in %s = %6s/s Avg: %7s Min: %7.1f Max: %7.1f P95: %7.1f%s Active: %3d/%-3d Err: %5d (%6s%%)\n' \
                "$prefix" "$count" "$(relampo_fmt_hms "$elapsed")" "$rate" "$avg" "$minv" "$maxv" "$p95" "$p95_alarm" "$active_last" "$active_max" "$errs" "$errpct"
            }
            relampo_print_github_diagnosis() {
              local total_count="$1"
              local total_err="$2"
              local total_p95="$3"
              local mem_peak_mb="$4"
              local mem_peak_pct="$5"
              local cpu_peak="$6"
              local go_delta="$7"
              local iowait_peak="$8"
              local iowait_samples="$9"
              if [ "$total_count" -le 0 ]; then
                return
              fi
              local errpct iowait_pct
              errpct="$(awk -v e="$total_err" -v c="$total_count" 'BEGIN { printf "%.2f", (c > 0 ? (e * 100.0) / c : 0) }')"
              iowait_pct="$(awk -v io="$iowait_peak" -v go="$RELAMPO_GO_SAMPLE_PEAK" 'BEGIN { if (go > 0) printf "%.1f", (io * 100.0) / go; else printf "0.0" }')"

              echo ""
              echo "Análisis automático de saturación"
              echo "Señales: ERR ${errpct}% | P95 ${total_p95} ms | MEM pico ${mem_peak_mb} MB (${mem_peak_pct}%) | CPU pico ${cpu_peak}% | Go Δ ${go_delta} | IO wait pico ${iowait_peak} | IO wait ${iowait_pct}% | muestras ${iowait_samples}"

              if awk -v e="$errpct" -v p="$total_p95" 'BEGIN { exit !(e >= 20.0 && p >= 8000.0) }'; then
                echo "Nivel: CRÍTICO"
                if [ "$iowait_samples" -eq 0 ]; then
                  echo "Lectura: degradación severa, pero IO wait quedó inconcluso (sin muestras válidas de pprof)."
                  echo "Acción: repetir la prueba y revisar 5xx, timeouts y colas del sistema objetivo."
                elif awk -v pct="$iowait_pct" 'BEGIN { exit !(pct >= 20.0) }'; then
                  echo "Lectura: probable cuello de botella externo (red/DB/servicio dependiente), con goroutines en espera de I/O."
                  echo "Acción: revisar latencia de dependencias, pool de conexiones y timeouts aguas abajo."
                elif awk -v mem="$mem_peak_pct" 'BEGIN { exit !(mem >= 85.0) }'; then
                  echo "Lectura: posible saturación de memoria del nodo generador."
                  echo "Acción: bajar VUs por nodo o distribuir en más nodos."
                elif awk -v cpu="$cpu_peak" 'BEGIN { exit !(cpu >= 85.0) }'; then
                  echo "Lectura: posible saturación del nodo generador (CPU alta)."
                  echo "Acción: bajar VUs por nodo o distribuir en más nodos."
                elif [ "$go_delta" -ge 1000 ]; then
                  echo "Lectura: acumulación alta de goroutines; patrón compatible con backpressure."
                  echo "Acción: reducir rampa inicial y validar capacidad real del backend antes de subir carga."
                else
                  echo "Lectura: hay degradación fuerte sin firma única de CPU/I/O."
                  echo "Acción: priorizar endpoints con más errores y correlacionar con logs del servidor."
                fi
              elif awk -v e="$errpct" 'BEGIN { exit !(e > 0.0) }'; then
                echo "Nivel: ALERTA"
                echo "Lectura: hay errores no esperados bajo carga."
                echo "Acción: revisar fallos por endpoint y repetir con la misma carga para confirmar patrón."
              elif awk -v p="$total_p95" 'BEGIN { exit !(p >= 8000.0) }'; then
                echo "Nivel: ALERTA"
                echo "Lectura: latencia P95 en zona de percepción negativa para usuarios."
                echo "Acción: optimizar endpoints más lentos o reducir concurrencia."
              elif awk -v mem="$mem_peak_pct" 'BEGIN { exit !(mem >= 85.0) }'; then
                echo "Nivel: ALERTA"
                echo "Lectura: memoria del nodo generador en zona alta."
                echo "Acción: reducir carga por nodo o ampliar distribución."
              else
                echo "Nivel: ESTABLE"
                echo "Lectura: sin señales críticas de saturación en esta corrida."
              fi
              echo ""
            }
            RELAMPO_GO_START=""
            RELAMPO_GO_END=""
            RELAMPO_GO_SAMPLE_PEAK=0
            RELAMPO_GO_IOWAIT_START=""
            RELAMPO_GO_IOWAIT_END=""
            RELAMPO_GO_IOWAIT_SAMPLE_PEAK=0
            RELAMPO_GO_IOWAIT_SAMPLES=0
            RELAMPO_MEM_PS_PEAK=0
            RELAMPO_MEM_TOTAL_MB="$(awk '/MemTotal:/ { print int($2/1024) }' /proc/meminfo 2>/dev/null | head -n1)"
            [ -z "$RELAMPO_MEM_TOTAL_MB" ] && RELAMPO_MEM_TOTAL_MB=0
            RELAMPO_CPU_PS_PEAK=0
            mkdir -p results
            RESULTS_RESOURCE_FILE="results/node-$RELAMPO_NODE.resources.jsonl"
            relampo_capture_go_sample() {
              local go_dump go_count go_iowait
              go_dump="$(curl -fsS --max-time 3 "http://127.0.0.1:6060/debug/pprof/goroutine?debug=2" 2>/dev/null || true)"
              if [ -z "$go_dump" ]; then
                return
              fi
              go_count="$(printf '%s\n' "$go_dump" | awk 'NR==1 { for (i=1; i<=NF; i++) if ($i ~ /^[0-9]+$/) { print $i; break } }')"
              if [ -z "$go_count" ]; then
                go_count="$(printf '%s\n' "$go_dump" | awk '/^goroutine [0-9]+ \\[/ { c++ } END { if (c > 0) print c }')"
              fi
              if [ -z "$go_count" ]; then
                return
              fi
              go_iowait="$(printf '%s\n' "$go_dump" | awk '/^goroutine [0-9]+ \\[[^]]*[Ii][Oo] wait[^]]*\\]/ { c++ } END { print c+0 }')"
              if [ -z "$go_iowait" ]; then
                go_iowait=0
              fi
              RELAMPO_GO_IOWAIT_SAMPLES=$((RELAMPO_GO_IOWAIT_SAMPLES + 1))
              if [ -z "$RELAMPO_GO_START" ]; then
                RELAMPO_GO_START="$go_count"
              fi
              RELAMPO_GO_END="$go_count"
              if [ "$go_count" -gt "$RELAMPO_GO_SAMPLE_PEAK" ]; then
                RELAMPO_GO_SAMPLE_PEAK="$go_count"
              fi
              if [ -z "$RELAMPO_GO_IOWAIT_START" ]; then
                RELAMPO_GO_IOWAIT_START="$go_iowait"
              fi
              RELAMPO_GO_IOWAIT_END="$go_iowait"
              if [ "$go_iowait" -gt "$RELAMPO_GO_IOWAIT_SAMPLE_PEAK" ]; then
                RELAMPO_GO_IOWAIT_SAMPLE_PEAK="$go_iowait"
              fi
            }
            relampo_capture_process_sample() {
              local worker_pid="$1"
              local rss_kb cpu_pct rss_mb sample_ts mem_pct_sample
              rss_kb="$(ps -p "$worker_pid" -o rss= 2>/dev/null | awk 'NR==1 { print int($1+0) }' || true)"
              cpu_pct="$(ps -p "$worker_pid" -o %cpu= 2>/dev/null | awk 'NR==1 { print $1+0 }' || true)"
              [ -z "$rss_kb" ] && rss_kb=0
              [ -z "$cpu_pct" ] && cpu_pct=0
              rss_mb=0
              if [ -n "$rss_kb" ] && [ "$rss_kb" -gt 0 ]; then
                rss_mb=$(( (rss_kb + 1023) / 1024 ))
                if [ "$rss_mb" -gt "$RELAMPO_MEM_PS_PEAK" ]; then
                  RELAMPO_MEM_PS_PEAK="$rss_mb"
                fi
              fi
              if [ -n "$cpu_pct" ]; then
                RELAMPO_CPU_PS_PEAK="$(awk -v a="$RELAMPO_CPU_PS_PEAK" -v b="$cpu_pct" 'BEGIN { if (b > a) printf "%.2f", b; else printf "%.2f", a }')"
              fi
              mem_pct_sample=0
              if [ "$RELAMPO_MEM_TOTAL_MB" -gt 0 ]; then
                mem_pct_sample="$(awk -v m="$rss_mb" -v t="$RELAMPO_MEM_TOTAL_MB" 'BEGIN { if (t > 0) printf "%.4f", (m * 100.0) / t; else printf "0" }')"
              fi
              sample_ts="$(date +%s)"
              printf '{"ts":%s,"mem_mb":%s,"mem_pct":%s,"cpu_pct":%s}\n' "$sample_ts" "$rss_mb" "$mem_pct_sample" "$cpu_pct" >> "$RESULTS_RESOURCE_FILE"
            }
            relampo_jmeter_progress() {
              local worker_pid="$1"
              local start_epoch
              local now
              local total_elapsed
              local events_file=""
              local prev_lines=1
              while kill -0 "$worker_pid" 2>/dev/null; do
                relampo_capture_go_sample
                relampo_capture_process_sample "$worker_pid"
                sleep 5
                if [ -z "$events_file" ] || [ ! -f "$events_file" ]; then
                  events_file="$(ls -1t results/node-*.events.*.jsonl 2>/dev/null | head -n1)"
                  if [ -z "$events_file" ] || [ ! -f "$events_file" ]; then
                    continue
                  fi
                  prev_lines=1
                fi
                start_epoch="${start_epoch:-$(date +%s)}"
                now="$(date +%s)"
                total_elapsed=$((now - start_epoch))

                local total_stats win_stats
                local total_count total_sum total_min total_max total_err total_p95 total_active total_active_max
                local win_count win_sum win_min win_max win_err win_p95 win_active win_active_max

                total_stats="$(relampo_extract_stats "$events_file" 1)"
                win_stats="$(relampo_extract_stats "$events_file" "$prev_lines")"
                IFS='|' read -r total_count total_sum total_min total_max total_err total_p95 total_active total_active_max <<< "$total_stats"
                IFS='|' read -r win_count win_sum win_min win_max win_err win_p95 win_active win_active_max <<< "$win_stats"

                relampo_print_summary "+" "$win_count" 5 "$win_sum" "$win_min" "$win_max" "$win_err" "$win_p95" "$win_active" "$win_active_max"
                relampo_print_summary "=" "$total_count" "$total_elapsed" "$total_sum" "$total_min" "$total_max" "$total_err" "$total_p95" "$total_active" "$total_active_max"

                prev_lines=$(( $(wc -l < "$events_file") + 1 ))
              done
            }
            LOG_PIPE="$(mktemp -u)"
            mkfifo "$LOG_PIPE"
            awk 'BEGIN{esc=sprintf("%c",27)} {raw=$0; line=$0; gsub(esc "\\[[0-9;]*[A-Za-z]", "", line); if (line ~ /^METHOD[[:space:]]+PATH/ || line ~ /^-+/ || line ~ /^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)[[:space:]]+/ || line ~ /Duration:/ || line ~ /Test finished\./ || line ~ /❌/ || line ~ /failed:/ || line ~ /[Ee]rror/ || line ~ /data_source:/) { print raw; fflush(); }}' < "$LOG_PIPE" > "$OUTPUT_FILE" &
            FILTER_PID=$!
            PULSE_PPROF=1 RELAMPO_WORKER_LOG_MODE=table RELAMPO_WORKER_SNAPSHOT_SECONDS=0 relampo-worker --yaml "$SCENARIO_FILE" --node "$RELAMPO_NODE" --total 2 $VUS_FLAG > "$LOG_PIPE" 2>&1 &
            WORKER_PID=$!
            relampo_jmeter_progress "$WORKER_PID"
            set +e
            wait "$WORKER_PID"
            WORKER_STATUS=$?
            set -e
            wait "$FILTER_PID" || true
            rm -f "$LOG_PIPE"
            relampo_capture_go_sample
            mkdir -p results
            PEAKS_FILE="results/node-$RELAMPO_NODE.peaks.json"
            EXIST_MEM="$(grep -Eo '"mem_peak_mb"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_CPU="$(grep -Eo '"cpu_peak"[[:space:]]*:[[:space:]]*[0-9]+([.][0-9]+)?' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+([.][0-9]+)?' || true)"
            EXIST_GO="$(grep -Eo '"go_peak"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_GO_START="$(grep -Eo '"go_start"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_GO_END="$(grep -Eo '"go_end"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_GO_DELTA="$(grep -Eo '"go_delta"[[:space:]]*:[[:space:]]*-?[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo -- '-?[0-9]+' || true)"
            EXIST_GO_IOWAIT_START="$(grep -Eo '"go_iowait_start"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_GO_IOWAIT_PEAK="$(grep -Eo '"go_iowait_peak"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_GO_IOWAIT_END="$(grep -Eo '"go_iowait_end"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_GO_IOWAIT_DELTA="$(grep -Eo '"go_iowait_delta"[[:space:]]*:[[:space:]]*-?[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo -- '-?[0-9]+' || true)"
            EXIST_GO_IOWAIT_SAMPLES="$(grep -Eo '"go_iowait_samples"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_MEM_TOTAL="$(grep -Eo '"mem_total_mb"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+' || true)"
            EXIST_MEM_PCT="$(grep -Eo '"mem_peak_pct"[[:space:]]*:[[:space:]]*[0-9]+([.][0-9]+)?' "$PEAKS_FILE" 2>/dev/null | tail -n1 | grep -Eo '[0-9]+([.][0-9]+)?' || true)"
            [ -z "$EXIST_MEM" ] && EXIST_MEM=0
            [ -z "$EXIST_CPU" ] && EXIST_CPU=0
            [ -z "$EXIST_GO" ] && EXIST_GO=0
            [ -z "$EXIST_GO_START" ] && EXIST_GO_START=0
            [ -z "$EXIST_GO_END" ] && EXIST_GO_END=0
            [ -z "$EXIST_GO_IOWAIT_START" ] && EXIST_GO_IOWAIT_START=0
            [ -z "$EXIST_GO_IOWAIT_PEAK" ] && EXIST_GO_IOWAIT_PEAK=0
            [ -z "$EXIST_GO_IOWAIT_END" ] && EXIST_GO_IOWAIT_END=0
            [ -z "$EXIST_GO_IOWAIT_SAMPLES" ] && EXIST_GO_IOWAIT_SAMPLES=0
            [ -z "$EXIST_MEM_TOTAL" ] && EXIST_MEM_TOTAL=0
            [ -z "$EXIST_MEM_PCT" ] && EXIST_MEM_PCT=0
            if [ "$EXIST_GO_START" -eq 0 ] && [ -n "$RELAMPO_GO_START" ]; then
              EXIST_GO_START="$RELAMPO_GO_START"
            fi
            if [ "$EXIST_GO_END" -eq 0 ] && [ -n "$RELAMPO_GO_END" ]; then
              EXIST_GO_END="$RELAMPO_GO_END"
            fi
            if [ -z "$EXIST_GO_DELTA" ]; then
              EXIST_GO_DELTA=$((EXIST_GO_END - EXIST_GO_START))
            fi
            if [ "$EXIST_GO_IOWAIT_START" -eq 0 ] && [ -n "$RELAMPO_GO_IOWAIT_START" ]; then
              EXIST_GO_IOWAIT_START="$RELAMPO_GO_IOWAIT_START"
            fi
            if [ "$EXIST_GO_IOWAIT_END" -eq 0 ] && [ -n "$RELAMPO_GO_IOWAIT_END" ]; then
              EXIST_GO_IOWAIT_END="$RELAMPO_GO_IOWAIT_END"
            fi
            if [ -z "$EXIST_GO_IOWAIT_DELTA" ]; then
              EXIST_GO_IOWAIT_DELTA=$((EXIST_GO_IOWAIT_END - EXIST_GO_IOWAIT_START))
            fi

            CLEAN_OUTPUT_FILE="$(mktemp)"
            awk 'BEGIN{esc=sprintf("%c",27)} {line=$0; gsub(esc "\\[[0-9;]*[A-Za-z]", "", line); print line}' "$OUTPUT_FILE" > "$CLEAN_OUTPUT_FILE"
            OUT_MEM="$(grep -Eo 'MEM Peak:[[:space:]]*[0-9]+' "$CLEAN_OUTPUT_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
            OUT_CPU="$(grep -Eo 'CPU Peak:[[:space:]]*[0-9]+([.][0-9]+)?' "$CLEAN_OUTPUT_FILE" | tail -n1 | grep -Eo '[0-9]+([.][0-9]+)?' || true)"
            OUT_GO="$(grep -Eo 'Go:[[:space:]]*[0-9]+' "$CLEAN_OUTPUT_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
            [ -z "$OUT_MEM" ] && OUT_MEM=0
            [ -z "$OUT_CPU" ] && OUT_CPU=0
            [ -z "$OUT_GO" ] && OUT_GO=0

            FINAL_MEM="$EXIST_MEM"
            if [ "$OUT_MEM" -gt "$FINAL_MEM" ]; then
              FINAL_MEM="$OUT_MEM"
            fi
            if [ "$RELAMPO_MEM_PS_PEAK" -gt "$FINAL_MEM" ]; then
              FINAL_MEM="$RELAMPO_MEM_PS_PEAK"
            fi
            FINAL_MEM_TOTAL="$EXIST_MEM_TOTAL"
            if [ "$RELAMPO_MEM_TOTAL_MB" -gt "$FINAL_MEM_TOTAL" ]; then
              FINAL_MEM_TOTAL="$RELAMPO_MEM_TOTAL_MB"
            fi
            FINAL_MEM_PCT="$EXIST_MEM_PCT"
            if [ "$FINAL_MEM_TOTAL" -gt 0 ]; then
              CALC_MEM_PCT="$(awk -v used="$FINAL_MEM" -v total="$FINAL_MEM_TOTAL" 'BEGIN { if (total > 0) printf "%.2f", (used * 100.0) / total; else printf "0.00" }')"
              FINAL_MEM_PCT="$(awk -v a="$FINAL_MEM_PCT" -v b="$CALC_MEM_PCT" 'BEGIN { if (b > a) printf "%.2f", b; else printf "%.2f", a }')"
            fi
            FINAL_CPU="$(awk -v a="$EXIST_CPU" -v b="$OUT_CPU" -v c="$RELAMPO_CPU_PS_PEAK" 'BEGIN { m=a; if (b > m) m=b; if (c > m) m=c; printf "%.2f", m }')"
            FINAL_GO="$EXIST_GO"
            if [ "$OUT_GO" -gt "$FINAL_GO" ]; then
              FINAL_GO="$OUT_GO"
            fi
            if [ "$RELAMPO_GO_SAMPLE_PEAK" -gt "$FINAL_GO" ]; then
              FINAL_GO="$RELAMPO_GO_SAMPLE_PEAK"
            fi
            FINAL_GO_IOWAIT="$EXIST_GO_IOWAIT_PEAK"
            if [ "$RELAMPO_GO_IOWAIT_SAMPLE_PEAK" -gt "$FINAL_GO_IOWAIT" ]; then
              FINAL_GO_IOWAIT="$RELAMPO_GO_IOWAIT_SAMPLE_PEAK"
            fi
            FINAL_GO_IOWAIT_SAMPLES="$EXIST_GO_IOWAIT_SAMPLES"
            if [ "$RELAMPO_GO_IOWAIT_SAMPLES" -gt "$FINAL_GO_IOWAIT_SAMPLES" ]; then
              FINAL_GO_IOWAIT_SAMPLES="$RELAMPO_GO_IOWAIT_SAMPLES"
            fi
            printf '{"mem_peak_mb":%s,"mem_total_mb":%s,"mem_peak_pct":%s,"cpu_peak":%s,"go_peak":%s,"go_start":%s,"go_end":%s,"go_delta":%s,"go_iowait_peak":%s,"go_iowait_start":%s,"go_iowait_end":%s,"go_iowait_delta":%s,"go_iowait_samples":%s}\n' "$FINAL_MEM" "$FINAL_MEM_TOTAL" "$FINAL_MEM_PCT" "$FINAL_CPU" "$FINAL_GO" "$EXIST_GO_START" "$EXIST_GO_END" "$EXIST_GO_DELTA" "$FINAL_GO_IOWAIT" "$EXIST_GO_IOWAIT_START" "$EXIST_GO_IOWAIT_END" "$EXIST_GO_IOWAIT_DELTA" "$FINAL_GO_IOWAIT_SAMPLES" > "$PEAKS_FILE"
            if [ "$RELAMPO_P95_ALERT" -eq 1 ]; then
              echo "ⅰ P90 response-time reference"
              echo "   ⚠ P90 > 8s: alert zone. User attention is at risk, and the experience may feel frustrating."
              echo "   ⚠ P90 > 15s: severe alert zone. This response time is generally beyond acceptable user expectations."
              echo ""
              echo "   Note: this alert does not automatically mean the application is slow."
              echo "   It is a reference signal based on user-experience and performance heuristics."
              echo ""
              echo "   Based on classic user response-time guidance (Jakob Nielsen: attention degrades around 10s)"
              echo "   and practical performance engineering ranges commonly associated with Scott Barber."
            fi
            FINAL_TOTAL_COUNT=0
            FINAL_TOTAL_ERR=0
            FINAL_TOTAL_P95=0
            FINAL_EVENTS_FILE="$(ls -1t results/node-*.events.*.jsonl 2>/dev/null | head -n1)"
            if [ -n "$FINAL_EVENTS_FILE" ] && [ -f "$FINAL_EVENTS_FILE" ]; then
              FINAL_TOTAL_STATS="$(relampo_extract_stats "$FINAL_EVENTS_FILE" 1)"
              IFS='|' read -r FINAL_TOTAL_COUNT _ _ _ FINAL_TOTAL_ERR FINAL_TOTAL_P95 _ _ <<< "$FINAL_TOTAL_STATS"
            fi
            [ -z "$FINAL_TOTAL_COUNT" ] && FINAL_TOTAL_COUNT=0
            [ -z "$FINAL_TOTAL_ERR" ] && FINAL_TOTAL_ERR=0
            [ -z "$FINAL_TOTAL_P95" ] && FINAL_TOTAL_P95=0
            if [ "$WORKER_STATUS" -ne 0 ]; then
              FAILURE_LINE="$(grep -E 'failed:|data_source:|no such file or directory|error:' "$CLEAN_OUTPUT_FILE" | tail -n1 || true)"
              if [ -z "$FAILURE_LINE" ]; then
                FAILURE_LINE="$(tail -n1 "$CLEAN_OUTPUT_FILE" 2>/dev/null || true)"
              fi
              if [ -n "$FAILURE_LINE" ]; then
                printf '%s\n' "$FAILURE_LINE" > "results/node-$RELAMPO_NODE.failure.txt"
              fi
            fi
            rm -f "$CLEAN_OUTPUT_FILE"
            relampo_print_github_diagnosis "$FINAL_TOTAL_COUNT" "$FINAL_TOTAL_ERR" "$FINAL_TOTAL_P95" "$FINAL_MEM" "$FINAL_MEM_PCT" "$FINAL_CPU" "$EXIST_GO_DELTA" "$FINAL_GO_IOWAIT" "$FINAL_GO_IOWAIT_SAMPLES"
            cat "$OUTPUT_FILE"
            rm -f "$OUTPUT_FILE"
            exit "$WORKER_STATUS"
          ) || WORKER_STATUS=$?
          mkdir -p results
          printf 'worker_status=%s\n' "$WORKER_STATUS" > "results/node-$RELAMPO_NODE.status.txt"
          if [ -f "$SCENARIO_DIR/results/node-$RELAMPO_NODE.failure.txt" ]; then
            FAILURE_REASON="$(head -n1 "$SCENARIO_DIR/results/node-$RELAMPO_NODE.failure.txt" | tr -d '\r' || true)"
            if [ -n "$FAILURE_REASON" ]; then
              printf 'worker_error=%s\n' "$FAILURE_REASON" >> "results/node-$RELAMPO_NODE.status.txt"
            fi
          fi
          if [ -d "$SCENARIO_DIR/results" ]; then
            cp -R "$SCENARIO_DIR/results"/. results/
          else
            echo "results directory not found in scenario path: $SCENARIO_DIR/results" >> "results/node-$RELAMPO_NODE.status.txt"
          fi
          exit "$WORKER_STATUS"

      - name: Upload logs/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-results-node-${{ matrix.node }}
          path: results/
